# ╔══════════════════════════════════════════════════════════════╗
# ║                  ✦ Lumière OS — Hyprland                    ║
# ║              Wayland Compositor Konfigürasyonu               ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── Monitör Ayarları ───────────────────────────────────────────
monitor = , preferred, auto, 1

# ─── Otomatik Başlatma ──────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = swww-daemon
exec-once = swww img ~/wallpapers/lumiere-default.png --transition-type grow --transition-pos center
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ─── Ortam Değişkenleri ─────────────────────────────────────────
env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, Lumiere-Cursors
env = QT_QPA_PLATFORMTHEME, qt5ct
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ─── Genel Ayarlar ──────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(F5A623ee) rgba(FFD080ee) 45deg
    col.inactive_border = rgba(2A2A4288)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# ─── Dekorasyon ─────────────────────────────────────────────────
decoration {
    rounding = 8

    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = rgba(0D0D1488)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.02
        contrast = 1.1
        brightness = 0.9
        vibrancy = 0.2
        new_optimizations = true
        xray = false
    }
}

# ─── Animasyonlar ───────────────────────────────────────────────
animations {
    enabled = true

    bezier = lumiere, 0.22, 0.68, 0, 1
    bezier = lumiere_bounce, 0.34, 1.56, 0.64, 1
    bezier = lumiere_smooth, 0.25, 0.1, 0.25, 1

    animation = windows, 1, 5, lumiere, slide
    animation = windowsIn, 1, 5, lumiere_bounce, slide
    animation = windowsOut, 1, 4, lumiere, slide
    animation = border, 1, 8, lumiere
    animation = borderangle, 1, 30, lumiere, loop
    animation = fade, 1, 4, lumiere_smooth
    animation = workspaces, 1, 5, lumiere, slidevert
    animation = layers, 1, 4, lumiere_bounce, fade
}

# ─── Tiling Layout ──────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

# ─── Input ──────────────────────────────────────────────────────
input {
    kb_layout = tr
    kb_variant =
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}

# ─── Pencere Kuralları ──────────────────────────────────────────
windowrulev2 = opacity 0.90 0.80, class:^(kitty)$
windowrulev2 = opacity 0.90 0.80, class:^(thunar)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(lumiere-welcome)$
windowrulev2 = size 800 600, class:^(lumiere-welcome)$
windowrulev2 = center, class:^(lumiere-welcome)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$

# ─── Klavye Kısayolları ─────────────────────────────────────────
$mainMod = SUPER

# Temel İşlemler
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/lumiere.rasi
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# Ekran Kilidi
bind = $mainMod, L, exec, swaylock

# Ekran Görüntüsü (lumiere-screenshot)
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh window

# Ses Kontrolleri (OSD bildirimli)
binde = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/osd.sh volume-up
binde = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/osd.sh volume-down
bind  = , XF86AudioMute, exec, ~/.config/hypr/scripts/osd.sh volume-mute
bind  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Parlaklık (OSD bildirimli)
binde = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/osd.sh brightness-up
binde = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/osd.sh brightness-down

# Pencere Odağı
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Pencere Taşıma
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Pencere Boyutlandırma
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# Çalışma Alanları
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Pencereyi Çalışma Alanına Taşı
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Özel Çalışma Alanı (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Fare ile
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Clipboard Geçmişi
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/lumiere.rasi | cliphist decode | wl-copy

# Duvar Kağıdı Seçici
bind = $mainMod, W, exec, lumiere-wallpaper

# Güç Menüsü
bind = $mainMod, X, exec, rofi -show power-menu -modi power-menu:~/.config/rofi/power-menu.sh -theme ~/.config/rofi/lumiere.rasi

# Tema Değiştirici (v0.2)
bind = $mainMod, T, exec, ~/.config/hypr/scripts/theme-switcher.sh toggle

# Lumière Ayarlar (v0.2)
bind = $mainMod, I, exec, lumiere-settings

# Sistem Monitörü (v0.2)
bind = $mainMod, M, exec, lumiere-monitor

# Kısayol Rehberi (v1.0)
bind = $mainMod, slash, exec, lumiere-cheatsheet
