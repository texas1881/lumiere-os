# ╔══════════════════════════════════════════════════════════════╗
# ║              ✦ Lumière OS — Kitty Terminal                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── Font ────────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        12.0
disable_ligatures never

# ─── İmleç ──────────────────────────────────────────────────────
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ─── Kaydırma ───────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager_history_size 100
wheel_scroll_multiplier 3.0

# ─── Pencere ────────────────────────────────────────────────────
window_padding_width  8 12 8 12
window_margin_width   0
single_window_margin_width -1
placement_strategy center
hide_window_decorations yes
confirm_os_window_close 0
initial_window_width  120c
initial_window_height 35c

# ─── Tab Bar ────────────────────────────────────────────────────
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2
tab_title_template  " {index}: {title} "
active_tab_font_style   bold
inactive_tab_font_style normal

# ─── Ses ────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ─── URL ────────────────────────────────────────────────────────
url_style curly
open_url_with default
detect_urls yes

# ─── Performans ─────────────────────────────────────────────────
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ─── RENK TEMASı — Lumière Dark ─────────────────────────────────

# Arka plan & ön plan
foreground           #E8E6F0
background           #0D0D14
background_opacity   0.92
dynamic_background_opacity yes

# Seçim
selection_foreground #0D0D14
selection_background #F5A623

# İmleç
cursor               #F5A623
cursor_text_color    #0D0D14

# URL
url_color            #60A5FA

# Tab renkleri
active_tab_foreground   #0D0D14
active_tab_background   #F5A623
inactive_tab_foreground #A9A6B8
inactive_tab_background #1A1A2E
tab_bar_background      #0D0D14

# Normal renkler
# black
color0  #0D0D14
# red
color1  #F87171
# green
color2  #4ADE80
# yellow
color3  #FBBF24
# blue
color4  #60A5FA
# magenta
color5  #C084FC
# cyan
color6  #22D3EE
# white
color7  #E8E6F0

# Parlak renkler
# bright black
color8  #6B6880
# bright red
color9  #FCA5A5
# bright green
color10 #86EFAC
# bright yellow
color11 #FDE68A
# bright blue
color12 #93C5FD
# bright magenta
color13 #D8B4FE
# bright cyan
color14 #67E8F9
# bright white
color15 #FFFFFF

# ─── Kısayollar ─────────────────────────────────────────────────
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0
map ctrl+shift+f5    load_config_file
map ctrl+shift+f     launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/fzf --no-sort --no-mouse --exact -i
